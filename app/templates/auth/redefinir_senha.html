<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redefinir Senha — AgroBanana</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a3a2a 0%, #2d6a4f 50%, #1b4332 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .auth-card {
      background: #fff;
      border-radius: 1.25rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2.25rem;
    }
    .auth-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1b4332;
      text-align: center;
      margin-bottom: .25rem;
    }
    .auth-subtitle {
      font-size: .9rem;
      color: #6b7280;
      text-align: center;
      margin-bottom: 2rem;
    }
    .form-label { font-weight: 500; color: #374151; font-size: .9rem; }
    .form-control {
      border-radius: .6rem;
      border: 1.5px solid #d1d5db;
      padding: .65rem 1rem;
      font-size: .95rem;
      transition: border-color .2s;
    }
    .form-control:focus {
      border-color: #2d6a4f;
      box-shadow: 0 0 0 3px rgba(45,106,79,.15);
    }
    .btn-primary-green {
      background: linear-gradient(135deg, #2d6a4f, #52b788);
      border: none;
      border-radius: .7rem;
      padding: .75rem;
      font-weight: 600;
      font-size: 1rem;
      color: #fff;
      width: 100%;
      transition: opacity .2s;
    }
    .btn-primary-green:hover { opacity: .9; color: #fff; }
    .link-verde { color: #2d6a4f; font-weight: 600; text-decoration: none; }
    .link-verde:hover { text-decoration: underline; color: #1b4332; }
    .input-group-text {
      border-radius: .6rem 0 0 .6rem;
      border: 1.5px solid #d1d5db;
      border-right: none;
      background: #f9fafb;
      color: #6b7280;
    }
    .input-group .form-control { border-radius: 0 .6rem .6rem 0; }
    .icon-circle {
      width: 64px; height: 64px;
      background: #d1fae5;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 1.75rem; color: #2d6a4f;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="icon-circle"><i class="bi bi-shield-lock-fill"></i></div>
    <div class="auth-title">Nova Senha</div>
    <div class="auth-subtitle">Escolha uma senha forte com pelo menos 6 caracteres.</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show rounded-3 py-2" role="alert" style="font-size:.88rem;">
            {{ message }}
            <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.redefinir_senha', token=token) }}" novalidate>
      <div class="mb-3">
        <label class="form-label" for="senha">Nova Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" id="senha" name="senha"
                 placeholder="Mínimo 6 caracteres" required autocomplete="new-password"
                 minlength="6">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label" for="confirmar">Confirmar Nova Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" id="confirmar" name="confirmar"
                 placeholder="Repita a senha" required autocomplete="new-password">
        </div>
      </div>

      <button type="submit" class="btn btn-primary-green">
        <i class="bi bi-check-circle-fill me-1"></i> Salvar nova senha
      </button>
    </form>

    <hr class="my-4">

    <p class="text-center mb-0" style="font-size:.9rem; color:#6b7280;">
      <a href="{{ url_for('auth.login') }}" class="link-verde">
        <i class="bi bi-arrow-left"></i> Voltar ao login
      </a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
