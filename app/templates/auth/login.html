<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — AgroBanana</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a3a2a 0%, #2d6a4f 50%, #1b4332 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .auth-card {
      background: #fff;
      border-radius: 1.25rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2.25rem;
    }
    .brand-logo {
      width: 160px;
      height: 160px;
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .brand-logo img { width: 160px; height: 160px; object-fit: contain; }
    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1b4332;
      text-align: center;
      margin-bottom: .25rem;
    }
    .auth-subtitle {
      font-size: .9rem;
      color: #6b7280;
      text-align: center;
      margin-bottom: 2rem;
    }
    .form-label { font-weight: 500; color: #374151; font-size: .9rem; }
    .form-control {
      border-radius: .6rem;
      border: 1.5px solid #d1d5db;
      padding: .65rem 1rem;
      font-size: .95rem;
      transition: border-color .2s;
    }
    .form-control:focus {
      border-color: #2d6a4f;
      box-shadow: 0 0 0 3px rgba(45,106,79,.15);
    }
    .btn-primary-green {
      background: linear-gradient(135deg, #2d6a4f, #52b788);
      border: none;
      border-radius: .7rem;
      padding: .75rem;
      font-weight: 600;
      font-size: 1rem;
      color: #fff;
      width: 100%;
      transition: opacity .2s;
    }
    .btn-primary-green:hover { opacity: .9; color: #fff; }
    .divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      color: #9ca3af;
      font-size: .85rem;
      margin: 1.5rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }
    .link-verde { color: #2d6a4f; font-weight: 600; text-decoration: none; }
    .link-verde:hover { text-decoration: underline; color: #1b4332; }
    .input-group-text {
      border-radius: .6rem 0 0 .6rem;
      border: 1.5px solid #d1d5db;
      border-right: none;
      background: #f9fafb;
      color: #6b7280;
    }
    .input-group .form-control { border-radius: 0 .6rem .6rem 0; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="brand-logo">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="AgroBanana">
    </div>
    <div class="auth-title">AgroBanana</div>
    <div class="auth-subtitle">Apoio à Decisão para Bananais</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show rounded-3 py-2" role="alert" style="font-size:.88rem;">
            {{ message }}
            <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
      <div class="mb-3">
        <label class="form-label" for="email">E-mail</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" class="form-control" id="email" name="email"
                 placeholder="seu@email.com" required autocomplete="email">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="senha">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" id="senha" name="senha"
                 placeholder="Sua senha" required autocomplete="current-password">
        </div>
      </div>

      <div class="mb-4 d-flex align-items-center justify-content-between">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="lembrar" name="lembrar">
          <label class="form-check-label text-muted" for="lembrar" style="font-size:.88rem;">
            Lembrar de mim
          </label>
        </div>
        <a href="{{ url_for('auth.esqueci_senha') }}" class="link-verde" style="font-size:.88rem;">
          Esqueci a senha
        </a>
      </div>

      <button type="submit" class="btn btn-primary-green">
        <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
      </button>
    </form>

    <div class="divider">ou</div>

    <p class="text-center mb-0" style="font-size:.9rem; color:#6b7280;">
      Não tem conta?
      <a href="{{ url_for('auth.registro') }}" class="link-verde">Criar conta gratuita</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
