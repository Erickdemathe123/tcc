name: CI — Testes, Lint e Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ───────────────────────────────────────────
  # 1. Qualidade de código e segurança
  # ───────────────────────────────────────────
  lint:
    name: Lint e Segurança
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependências de dev
        run: pip install flake8 bandit

      - name: Lint — flake8
        run: flake8 app/ --max-line-length=120 --exclude=app/migrations

      - name: Segurança — bandit
        run: bandit -r app/ -ll --exclude app/migrations

  # ───────────────────────────────────────────
  # 2. Testes com cobertura
  # ───────────────────────────────────────────
  test:
    name: Testes Unitários e de Integração
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements-dev.txt

      - name: Rodar testes com cobertura
        env:
          SECRET_KEY: test-ci-secret-key
          FLASK_ENV: testing
        run: pytest

      - name: Upload do relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

      # Descomente quando configurar o SonarCloud (sonar-project.properties)
      # - name: SonarCloud Scan
      #   uses: SonarSource/sonarcloud-github-action@master
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ───────────────────────────────────────────
  # 3. Validar migrações com PostgreSQL real
  # ───────────────────────────────────────────
  migrations:
    name: Validar Migrações (PostgreSQL)
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: agrobanana_ci
          POSTGRES_USER: agrobanana
          POSTGRES_PASSWORD: agrobanana
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar migrações
        env:
          DATABASE_URL: postgresql://agrobanana:agrobanana@localhost:5432/agrobanana_ci
          SECRET_KEY: ci-migration-key
        run: flask db upgrade

  # ───────────────────────────────────────────
  # 4. Build da imagem Docker
  # ───────────────────────────────────────────
  docker-build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: migrations
    steps:
      - uses: actions/checkout@v4

      - name: Build da imagem
        run: docker build -t agrobanana:${{ github.sha }} .

      # Ativa apenas em push para master — faz push para ghcr.io
      - name: Login no GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push da imagem (somente master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          docker tag agrobanana:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/agrobanana:latest
          docker tag agrobanana:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/agrobanana:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/agrobanana:latest
          docker push ghcr.io/${{ github.repository_owner }}/agrobanana:${{ github.sha }}

  # ───────────────────────────────────────────
  # 5. Deploy no servidor (acionamento manual)
  # Configure os secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY
  # ───────────────────────────────────────────
  deploy:
    name: Deploy no Servidor
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/agrobanana
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
